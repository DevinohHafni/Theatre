<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineManager — Theater Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:         #07070e;
  --surface:    #0d0d18;
  --card:       #111120;
  --card2:      #161628;
  --border:     #1e1e35;
  --border2:    #28284a;
  --border3:    #333360;
  --gold:       #e2b96f;
  --gold2:      #c99a45;
  --gold-dim:   #7a5c22;
  --gold-glow:  rgba(226,185,111,0.12);
  --gold-glow2: rgba(226,185,111,0.06);
  --red:        #f07070;
  --red-bg:     rgba(240,112,112,0.08);
  --red-border: rgba(240,112,112,0.2);
  --green:      #5ecf8a;
  --green-bg:   rgba(94,207,138,0.08);
  --green-border:rgba(94,207,138,0.2);
  --blue:       #6ca0f0;
  --blue-bg:    rgba(108,160,240,0.08);
  --blue-border:rgba(108,160,240,0.2);
  --purple:     #a78bfa;
  --text:       #eeeef8;
  --text2:      #8888aa;
  --text3:      #4a4a6a;
  --radius:     10px;
  --radius-lg:  14px;
  --shadow:     0 8px 32px rgba(0,0,0,0.6);
  --shadow-sm:  0 2px 12px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(226,185,111,0.04) 0%, transparent 60%);
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 10px; }

/* ── Sidebar ── */
#sidebar {
  width: 230px;
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 30px 22px 24px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(226,185,111,0.06) 0%, transparent 100%);
}
.sidebar-logo h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.sidebar-logo span {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text3);
  display: block;
  margin-top: 4px;
}

nav { flex: 1; padding: 18px 12px; }
.nav-section {
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text3);
  font-weight: 600;
  padding: 16px 10px 7px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text2);
  font-size: 0.84rem;
  font-weight: 500;
  transition: all .18s ease;
  margin-bottom: 2px;
  border: 1px solid transparent;
  position: relative;
}
.nav-item:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text);
}
.nav-item.active {
  background: var(--gold-glow);
  color: var(--gold);
  border-color: rgba(226,185,111,0.2);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -12px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 18px;
  background: var(--gold);
  border-radius: 0 3px 3px 0;
}
.nav-icon { font-size: 0.95rem; width: 20px; text-align: center; opacity: 0.9; }

/* ── Main ── */
#main { margin-left: 230px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── Topbar ── */
#topbar {
  background: rgba(13,13,24,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 36px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0; z-index: 50;
}
#topbar h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
#topbar .actions { display: flex; gap: 10px; }

/* ── Content ── */
#content { padding: 30px 36px; flex: 1; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 20px;
  border: none;
  border-radius: var(--radius);
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .18s ease;
  text-decoration: none;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: #07070e;
  box-shadow: 0 2px 12px rgba(226,185,111,0.25);
}
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(226,185,111,0.35); filter: brightness(1.05); }
.btn-gold:active { transform: translateY(0); }
.btn-outline {
  background: rgba(255,255,255,0.04);
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-outline:hover { border-color: var(--border3); color: var(--text); background: rgba(255,255,255,0.07); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.btn-danger:hover { background: rgba(240,112,112,0.15); }
.btn-success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.btn-success:hover { background: rgba(94,207,138,0.15); }
.btn-sm { padding: 5px 12px; font-size: 0.75rem; }

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  transition: all .2s ease;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(226,185,111,0.3), transparent);
  opacity: 0;
  transition: opacity .2s;
}
.stat-card:hover { border-color: rgba(226,185,111,0.25); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.stat-card:hover::after { opacity: 1; }
.stat-label {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text3);
  font-weight: 600;
  margin-bottom: 10px;
}
.stat-value {
  font-family: 'Playfair Display', serif;
  font-size: 2.1rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.stat-sub { font-size: 0.72rem; color: var(--text3); margin-top: 6px; font-weight: 500; }

/* ── Table ── */
.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.015);
}
.table-header h3 {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.01em;
}
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th {
  padding: 11px 18px;
  text-align: left;
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text3);
  font-weight: 600;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 13px 18px;
  border-bottom: 1px solid rgba(30,30,53,0.8);
  color: var(--text2);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr { transition: background .12s; }
tr:hover td { background: rgba(255,255,255,0.025); color: var(--text); }
.td-main { color: var(--text); font-weight: 500; }
.td-actions { display: flex; gap: 6px; }

/* ── Badges ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  border: 1px solid transparent;
}
.badge-gold   { background: rgba(226,185,111,0.12); color: var(--gold); border-color: rgba(226,185,111,0.2); }
.badge-green  { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.badge-red    { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
.badge-blue   { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }
.badge-gray   { background: rgba(74,74,106,0.15); color: var(--text3); border-color: var(--border2); }
.badge-purple { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }

/* ── Modal ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 520px;
  box-shadow: var(--shadow);
  animation: slideIn .22s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 26px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}
.modal-head h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.08rem;
  font-weight: 600;
  color: var(--text);
}
.modal-close {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  color: var(--text3);
  font-size: 1rem;
  cursor: pointer;
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.modal-close:hover { color: var(--text); background: rgba(255,255,255,0.1); }
.modal-body { padding: 26px; }
.modal-foot {
  padding: 18px 26px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  background: rgba(255,255,255,0.01);
}

/* ── Forms ── */
.form-group { margin-bottom: 18px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 7px;
}
input, select, textarea {
  width: 100%;
  background: rgba(7,7,14,0.8);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 13px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.84rem;
  transition: all .18s;
  outline: none;
}
input:hover, select:hover, textarea:hover { border-color: var(--border3); }
input:focus, select:focus, textarea:focus {
  border-color: var(--gold-dim);
  background: rgba(226,185,111,0.03);
  box-shadow: 0 0 0 3px rgba(226,185,111,0.08);
}
select option { background: var(--card2); }
textarea { resize: vertical; min-height: 76px; }
input[readonly] { cursor: default; opacity: 0.8; }

/* ── Search ── */
.search-wrap { position: relative; }
.search-wrap input { padding-left: 34px; }
.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 0.85rem;
  pointer-events: none;
}

/* ── Toast ── */
#toast-container {
  position: fixed;
  bottom: 28px; right: 28px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 18px;
  border-radius: 11px;
  font-size: 0.82rem;
  font-weight: 500;
  box-shadow: var(--shadow);
  animation: toastIn .28s cubic-bezier(0.34,1.56,0.64,1);
  min-width: 240px;
  border: 1px solid;
}
.toast-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(24px) scale(0.95); }
  to   { opacity: 1; transform: none; }
}
.toast-success { background: #081810; border-color: var(--green-border); color: var(--green); }
.toast-success .toast-icon { background: var(--green-bg); }
.toast-error   { background: #180808; border-color: var(--red-border); color: var(--red); }
.toast-error .toast-icon { background: var(--red-bg); }
.toast-info    { background: #080c18; border-color: var(--blue-border); color: var(--blue); }
.toast-info .toast-icon { background: var(--blue-bg); }
.toast-fade { opacity: 0; transition: opacity .35s; }

/* ── Empty ── */
.empty { text-align: center; padding: 56px 20px; color: var(--text3); }
.empty-icon { font-size: 2.2rem; margin-bottom: 14px; opacity: 0.5; }
.empty p { font-size: 0.86rem; line-height: 1.6; }

/* ── Spinner ── */
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .65s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row td { text-align: center; padding: 44px; color: var(--text3); }

/* ── Mono ── */
.mono { font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; }

/* ── Divider ── */
.divider { height: 1px; background: var(--border); margin: 4px 0; }

@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #main { margin-left: 0; }
  .form-row { grid-template-columns: 1fr; }
  #content { padding: 16px; }
}
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <h1>CineManager</h1>
    <span>Theater System</span>
  </div>
  <nav>
    <div class="nav-section">Overview</div>
    <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">⬛</span> Dashboard
    </div>

    <div class="nav-section">Management</div>
    <div class="nav-item" data-page="movies" onclick="navigate('movies')">
      <span class="nav-icon">🎬</span> Movies
    </div>
    <div class="nav-item" data-page="theaters" onclick="navigate('theaters')">
      <span class="nav-icon">🏛</span> Theaters
    </div>
    <div class="nav-item" data-page="shows" onclick="navigate('shows')">
      <span class="nav-icon">🎭</span> Shows
    </div>
    <div class="nav-section">Sales</div>
    <div class="nav-item" data-page="customers" onclick="navigate('customers')">
      <span class="nav-icon">👤</span> Customers
    </div>
    <div class="nav-item" data-page="bookings" onclick="navigate('bookings')">
      <span class="nav-icon">🎟</span> Bookings
    </div>
  </nav>
</aside>

<!-- ── Main ── -->
<div id="main">
  <header id="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div class="actions" id="topbar-actions"></div>
  </header>
  <div id="content"></div>
</div>

<!-- ── Toast Container ── -->
<div id="toast-container"></div>

<!-- ══════════ MODALS ══════════ -->

<!-- Movie Modal -->
<div class="overlay" id="movie-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="movie-modal-title">Add Movie</h3>
      <button class="modal-close" onclick="closeModal('movie-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="movie-id">
      <div class="form-row">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="movie-title" placeholder="Movie title">
        </div>
        <div class="form-group">
          <label>Genre</label>
          <select id="movie-genre">
            <option value="">Select genre</option>
            <option>Action</option><option>Comedy</option><option>Drama</option>
            <option>Horror</option><option>Romance</option><option>Sci-Fi</option>
            <option>Thriller</option><option>Animation</option><option>Documentary</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Duration (mins) *</label>
          <input type="number" id="movie-duration" placeholder="120" min="1">
        </div>
        <div class="form-group">
          <label>Language</label>
          <input type="text" id="movie-language" placeholder="English">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rating</label>
          <select id="movie-rating">
            <option value="">Select rating</option>
            <option>U</option><option>UA</option><option>A</option>
            <option>G</option><option>PG</option><option>PG-13</option><option>R</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="movie-desc" placeholder="Short description..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('movie-modal')">Cancel</button>
      <button class="btn btn-gold" onclick="saveMovie()">Save Movie</button>
    </div>
  </div>
</div>

<!-- Theater Modal -->
<div class="overlay" id="theater-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="theater-modal-title">Add Theater</h3>
      <button class="modal-close" onclick="closeModal('theater-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="theater-id">
      <div class="form-row">
        <div class="form-group">
          <label>Hall Name *</label>
          <input type="text" id="theater-name" placeholder="Grand Hall">
        </div>
        <div class="form-group">
          <label>Total Seats *</label>
          <input type="number" id="theater-seats" placeholder="200" min="1">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="theater-desc" placeholder="Hall description..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('theater-modal')">Cancel</button>
      <button class="btn btn-gold" onclick="saveTheater()">Save Theater</button>
    </div>
  </div>
</div>

<!-- Show Modal -->
<div class="overlay" id="show-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="show-modal-title">Add Show</h3>
      <button class="modal-close" onclick="closeModal('show-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="show-id">
      <div class="form-row">
        <div class="form-group">
          <label>Movie *</label>
          <select id="show-movie"></select>
        </div>
        <div class="form-group">
          <label>Theater *</label>
          <select id="show-theater"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="show-date">
        </div>
        <div class="form-group">
          <label>Time *</label>
          <input type="time" id="show-time">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Ticket Price (₹) *</label>
          <input type="number" id="show-price" placeholder="250" min="1">
        </div>
        <div class="form-group" id="show-status-group">
          <label>Status</label>
          <select id="show-status">
            <option value="active">Active</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('show-modal')">Cancel</button>
      <button class="btn btn-gold" onclick="saveShow()">Save Show</button>
    </div>
  </div>
</div>

<!-- Customer Modal -->

<script>
const API = '/api';

/* ─────────────────────────────────────
   ROUTING
───────────────────────────────────── */
function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  const titles = {
    dashboard: 'Dashboard',
    movies: 'Movies',
    theaters: 'Theaters',
    shows: 'Shows',
    customers: 'Customers',
    bookings: 'Bookings'
  };
  document.getElementById('page-title').textContent = titles[page];
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';
  const pages = { dashboard, movies, theaters, shows, customers, bookings };
  pages[page]();
}

/* ─────────────────────────────────────
   API HELPERS
───────────────────────────────────── */
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

/* ─────────────────────────────────────
   TOAST
───────────────────────────────────── */
function toast(msg, type = 'success') {
  const icons = { success: '✓', error: '✕', info: 'i' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<div class="toast-icon">${icons[type]}</div><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.classList.add('toast-fade'); setTimeout(() => el.remove(), 400); }, 3000);
}

/* ─────────────────────────────────────
   MODAL
───────────────────────────────────── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

/* ─────────────────────────────────────
   CONFIRM
───────────────────────────────────── */
function confirmDelete(msg, cb) {
  document.getElementById('confirm-message').textContent = msg;
  const btn = document.getElementById('confirm-ok-btn');
  btn.onclick = () => { closeModal('confirm-modal'); cb(); };
  openModal('confirm-modal');
}

/* ─────────────────────────────────────
   SEARCH HELPER
───────────────────────────────────── */
function filterTable(inputId, tbodyId) {
  const q = document.getElementById(inputId).value.toLowerCase();
  document.querySelectorAll(`#${tbodyId} tr`).forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

async function loadMovies() {
  try {
    const data = await apiFetch('/movies');
    const tbody = document.getElementById('movie-tbody');
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">🎬</div><p>No movies added yet.</p></div></td></tr>`; return; }
    tbody.innerHTML = data.map(m => `

        <td>${m.genre ? `<span class="badge badge-blue">${m.genre}</span>` : '—'}</td>
        <td>${m.duration_minutes} min</td>
        <td>${m.language}</td>
        <td>${m.rating ? `<span class="badge badge-gold">${m.rating}</span>` : '—'}</td>
        <td><div class="td-actions">
          <button class="btn btn-outline btn-sm" onclick='openMovieModal(${JSON.stringify(m)})'>Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMovie(${m.id},'${escHtml(m.title)}')">Delete</button>
        </div></td>
      </tr>`).join('');

function openMovieModal(m = null) {
  document.getElementById('movie-modal-title').textContent = m ? 'Edit Movie' : 'Add Movie';
  document.getElementById('movie-id').value = m ? m.id : '';
  document.getElementById('movie-title').value = m ? m.title : '';
  document.getElementById('movie-genre').value = m ? m.genre : '';
  document.getElementById('movie-duration').value = m ? m.duration_minutes : '';
  document.getElementById('movie-language').value = m ? m.language : 'English';
  document.getElementById('movie-rating').value = m ? m.rating : '';
  document.getElementById('movie-desc').value = m ? m.description : '';
  openModal('movie-modal');
}

async function saveMovie() {
  const id = document.getElementById('movie-id').value;
  const body = {
    title: document.getElementById('movie-title').value.trim(),
    genre: document.getElementById('movie-genre').value,
    duration_minutes: parseInt(document.getElementById('movie-duration').value),
    language: document.getElementById('movie-language').value.trim() || 'English',
    rating: document.getElementById('movie-rating').value,
    description: document.getElementById('movie-desc').value.trim()
  };
  if (!body.title || !body.duration_minutes) { toast('Title and duration are required', 'error'); return; }
  try {
    if (id) await apiFetch(`/movies/${id}`, { method: 'PUT', body: JSON.stringify(body) });
    else await apiFetch('/movies', { method: 'POST', body: JSON.stringify(body) });
    toast(id ? 'Movie updated' : 'Movie added');
    closeModal('movie-modal');
    await loadMovies();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteMovie(id, name) {
  confirmDelete(`Delete movie "${name}"? All associated shows will be removed.`, async () => {
    try { await apiFetch(`/movies/${id}`, { method: 'DELETE' }); toast('Movie deleted'); await loadMovies(); }
    catch (e) { toast(e.message, 'error'); }
  });
}

      return `<tr>
        <td class="td-main">${s.movie_title}</td>
        <td>${s.theater_name}</td>
        <td class="mono">${s.show_date}</td>
        <td class="mono">${s.show_time}</td>

        <td><span class="badge ${stBadge[s.status] || 'badge-gray'}">${s.status}</span></td>

          <button class="btn btn-outline btn-sm" onclick='openShowModal(${JSON.stringify(s)})'>Edit</button>

  document.getElementById('show-time').value = s ? s.show_time : '';
  document.getElementById('show-price').value = s ? s.ticket_price : '';

    else await apiFetch('/customers', { method: 'POST', body: JSON.stringify(body) });
    toast(id ? 'Customer updated' : 'Customer added');
    closeModal('customer-modal');
    await loadCustomers();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteCustomer(id, name) {
  confirmDelete(`Delete customer "${name}"?`, async () => {
    try { await apiFetch(`/customers/${id}`, { method: 'DELETE' }); toast('Customer deleted'); await loadCustomers(); }
    catch (e) { toast(e.message, 'error'); }
  });
}

/* ─────────────────────────────────────
   BOOKINGS
───────────────────────────────────── */
async function bookings() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-gold" onclick="openNewBooking()">+ New Booking</button>`;
  document.getElementById('content').innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <h3>All Bookings</h3>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search..." oninput="filterTable('booking-search','booking-tbody')" id="booking-search" style="width:200px">
        </div>
      </div>
      <table>
        <thead><tr><th>#</th><th>Customer</th><th>Movie</th><th>Theater</th><th>Date/Time</th><th>Seats</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="booking-tbody"><tr class="loading-row"><td colspan="9"><span class="spinner"></span></td></tr></tbody>
      </table>
    </div>`;
  await loadBookings();
}

async function loadBookings() {
  try {
    const data = await apiFetch('/bookings');
    const tbody = document.getElementById('booking-tbody');
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="empty-icon">🎟</div><p>No bookings yet.</p></div></td></tr>`; return; }
    tbody.innerHTML = data.map(b => `
      <tr>
        <td class="mono" style="color:var(--text3)">#${b.id}</td>
        <td class="td-main">${b.customer_name}</td>
        <td>${b.movie_title}</td>
        <td>${b.theater_name}</td>
        <td class="mono" style="font-size:.75rem">${b.show_date} ${b.show_time}</td>
        <td><span class="badge badge-gold">${b.num_seats}</span></td>
        <td class="mono">₹${parseFloat(b.total_amount).toFixed(2)}</td>
        <td><span class="badge ${b.booking_status === 'confirmed' ? 'badge-green' : 'badge-red'}">${b.booking_status}</span></td>
        <td><div class="td-actions">
          ${b.booking_status === 'confirmed' ? `<button class="btn btn-danger btn-sm" onclick="cancelBooking(${b.id})">Cancel</button>` : ''}
          <button class="btn btn-outline btn-sm" onclick="deleteBooking(${b.id})">Delete</button>
        </div></td>
      </tr>`).join('');
  } catch (e) { toast(e.message, 'error'); }
}

let showsList = [];

async function openNewBooking() {
  try {
    const [custs, shws] = await Promise.all([apiFetch('/customers'), apiFetch('/shows')]);
    if (!custs.length) { toast('Add at least one customer before booking.', 'error'); return; }
    showsList = shws.filter(s => s.status === 'active' && s.available_seats > 0);
    if (!showsList.length) { toast('No active shows with available seats. Add a show first.', 'error'); return; }
    document.getElementById('booking-customer').innerHTML =
      custs.map(c => `<option value="${c.id}">${c.name} (${c.email})</option>`).join('');
    document.getElementById('booking-show').innerHTML =
      showsList.map(s => `<option value="${s.id}" data-price="${s.ticket_price}">${s.movie_title} — ${s.theater_name} — ${s.show_date} ${s.show_time} (${s.available_seats} seats left)</option>`).join('');
    document.getElementById('booking-seats').value = 1;
    updateBookingPrice();
    openModal('booking-modal');
  } catch(e) { toast('Failed to load booking data: ' + e.message, 'error'); }
}

function updateBookingPrice() {
  const sel = document.getElementById('booking-show');
  if (!sel.options.length) return;
  const price = parseFloat(sel.options[sel.selectedIndex]?.dataset.price || 0);
  const seats = parseInt(document.getElementById('booking-seats').value) || 0;
  document.getElementById('booking-total').value = `₹${(price * seats).toFixed(2)}`;
}

async function saveBooking() {
  const body = {
    show_id: parseInt(document.getElementById('booking-show').value),
    customer_id: parseInt(document.getElementById('booking-customer').value),
    num_seats: parseInt(document.getElementById('booking-seats').value)
  };
  if (!body.num_seats || body.num_seats < 1) { toast('Enter at least 1 seat', 'error'); return; }
  try {
    const res = await apiFetch('/bookings', { method: 'POST', body: JSON.stringify(body) });
    toast(`Booking confirmed! Total: ₹${res.total_amount.toFixed(2)}`);
    closeModal('booking-modal');
    if (document.getElementById('booking-tbody')) await loadBookings();
  } catch (e) { toast(e.message, 'error'); }
}

async function cancelBooking(id) {
  confirmDelete('Cancel this booking? Seats will be restored.', async () => {
    try { await apiFetch(`/bookings/${id}/cancel`, { method: 'PUT' }); toast('Booking cancelled', 'info'); await loadBookings(); }
    catch (e) { toast(e.message, 'error'); }
  });
}

async function deleteBooking(id) {
  confirmDelete('Delete this booking record?', async () => {
    try { await apiFetch(`/bookings/${id}`, { method: 'DELETE' }); toast('Booking deleted'); await loadBookings(); }
    catch (e) { toast(e.message, 'error'); }
  });
}

/* ─────────────────────────────────────
   UTILS
───────────────────────────────────── */
function escHtml(str) {
  return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ─────────────────────────────────────
   INIT
───────────────────────────────────── */
navigate('dashboard');
</script>
